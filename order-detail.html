<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂單詳情 | VISTRA 台灣</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/pages.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.order-detail-page{max-width:800px;margin:0 auto;padding:48px 20px;}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:12px;}
.order-header h2{font-size:22px;font-weight:900;}
.order-status-badge{padding:6px 20px;border-radius:var(--radius-xl);font-size:13px;font-weight:700;background:#fff3e0;color:#f57c00;}
.detail-section{margin-bottom:32px;background:var(--bg-light);border-radius:var(--radius-md);padding:24px;}
.detail-section h3{font-size:16px;font-weight:700;margin-bottom:16px;}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid var(--border-color);}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--text-light);}
.item-list .item-row{display:flex;align-items:center;gap:16px;padding:12px 0;border-bottom:1px solid var(--border-color);}
.item-list .item-row:last-child{border-bottom:none;}
.item-icon{width:48px;height:48px;background:white;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text-light);font-size:20px;}
.tracking-steps{display:flex;justify-content:space-between;position:relative;margin:24px 0;}
.tracking-steps::before{content:'';position:absolute;top:16px;left:10%;right:10%;height:2px;background:var(--border-color);}
.tracking-step{text-align:center;position:relative;z-index:1;}
.tracking-dot{width:32px;height:32px;border-radius:50%;background:var(--border-color);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;color:white;font-size:12px;}
.tracking-dot.active{background:var(--pink-primary);}
.tracking-dot.done{background:#4CAF50;}
.tracking-label{font-size:12px;color:var(--text-light);}
</style>
</head>
<body data-page="">
<div id="shared-header"></div>
<main class="main-content">
<div class="container">
    <div class="order-detail-page" id="orderDetailContent">
        <div style="text-align:center;padding:60px;"><p style="color:var(--text-light);">載入訂單資料中...</p></div>
    </div>
</div>
</main>
<div id="shared-footer"></div>
<script src="js/components.js?v=3"></script><script src="js/cart.js?v=3"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var params = new URLSearchParams(window.location.search);
    var orderId = params.get('id');
    var order = orders.find(function(o) { return o.id === orderId; });
    var el = document.getElementById('orderDetailContent');
    if (!order) {
        el.innerHTML = '<div class="empty-state"><i class="fa-solid fa-box-open"></i><h2>找不到訂單</h2><p>此訂單不存在或已被刪除</p><a href="orders.html" class="btn btn-primary">返回訂單列表</a></div>';
        return;
    }
    var d = new Date(order.createdAt);
    var dateStr = d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    var payMap = {
        credit:'信用卡',
        atm:'ATM轉帳',
        linepay:'LINE Pay',
        cod:'貨到付款',
        paypal:'PayPal'
    };
    function normalizePaymentKey(v) {
        return String(v || '').toLowerCase().replace(/[^a-z]/g, '');
    }
    function renderPayment(v) {
        var key = normalizePaymentKey(v);
        return payMap[key] || v || '-';
    }
    var shipMap = {home:'宅配到府',store:'門市取貨',cvs:'超商取貨'};
    var si = order.shippingInfo || order.shipping || {};
    var html = '<div class="order-header"><h2>訂單 #'+order.id+'</h2><span class="order-status-badge">'+order.status+'</span></div>';
    html += '<div class="detail-section"><h3>訂單進度</h3><div class="tracking-steps"><div class="tracking-step"><div class="tracking-dot done"><i class="fa-solid fa-check"></i></div><div class="tracking-label">訂單成立</div></div><div class="tracking-step"><div class="tracking-dot active"><i class="fa-solid fa-box"></i></div><div class="tracking-label">處理中</div></div><div class="tracking-step"><div class="tracking-dot"><i class="fa-solid fa-truck"></i></div><div class="tracking-label">已出貨</div></div><div class="tracking-step"><div class="tracking-dot"><i class="fa-solid fa-house"></i></div><div class="tracking-label">已送達</div></div></div></div>';
    html += '<div class="detail-section"><h3>訂單資訊</h3><div class="detail-row"><span class="detail-label">訂單編號</span><span>'+order.id+'</span></div><div class="detail-row"><span class="detail-label">下單時間</span><span>'+dateStr+'</span></div><div class="detail-row"><span class="detail-label">付款方式</span><span style="display:inline-flex;align-items:center;min-height:18px;">'+renderPayment(si.payment)+'</span></div><div class="detail-row"><span class="detail-label">配送方式</span><span>'+(shipMap[si.method]||si.method||'-')+'</span></div></div>';
    html += '<div class="detail-section"><h3>收件資訊</h3><div class="detail-row"><span class="detail-label">收件人</span><span>'+(si.name||'-')+'</span></div><div class="detail-row"><span class="detail-label">手機</span><span>'+(si.phone||'-')+'</span></div><div class="detail-row"><span class="detail-label">地址</span><span>'+(si.city||'')+' '+(si.address||'-')+'</span></div></div>';
    // Items
    html += '<div class="detail-section"><h3>商品明細</h3><div class="item-list">';
    order.items.forEach(function(item) {
        var imgUrl = '';
        if(item.name.indexOf('LUCENT')>-1 || item.name.indexOf('AURA ICE')>-1) imgUrl = 'images/owndays/aura-ice.png';
        else if(item.name.indexOf('NC3019N')>-1 || item.name.indexOf('OR2071N')>-1) imgUrl = 'images/owndays/eyeglasses_01.webp';
        else if(item.name.indexOf('OF2072T')>-1) imgUrl = 'images/owndays/eyeglasses_02.webp';
        else if(item.name.indexOf('LB1009G')>-1) imgUrl = 'images/owndays/eyeglasses_03.webp';
        else if(item.name.indexOf('OG2025B')>-1) imgUrl = 'images/owndays/eyeglasses_04.webp';
        else if(item.name.indexOf('SNP1020X')>-1) imgUrl = 'images/owndays/eyeglasses_05.webp';
        else if(item.name.indexOf('AF2088T')>-1) imgUrl = 'images/owndays/eyeglasses_06.webp';
        else if(item.name.indexOf('MG3031N')>-1) imgUrl = 'images/owndays/eyeglasses_07.webp';
        else if(item.name.indexOf('PL3050N')>-1) imgUrl = 'images/owndays/eyeglasses_08.webp';
        else if(item.name.indexOf('AURA')>-1 || item.name.indexOf('LUMINA')>-1) imgUrl = 'images/owndays/aura-ice.png';
        var imgHtml = imgUrl ? '<img src="'+imgUrl+'" style="width:100%;height:100%;object-fit:cover;background:transparent;border-radius:4px;">' : '<i class="fa-solid fa-glasses"></i>';
        html += '<div class="item-row"><div class="item-icon" style="padding:0;overflow:hidden;display:flex;align-items:center;justify-content:center;">'+imgHtml+'</div><div style="flex:1;"><div style="font-weight:700;font-size:14px;">'+item.name+'</div><div style="font-size:12px;color:var(--text-light);">'+item.lens+' &times; '+item.qty+'</div></div><div style="font-weight:700;color:var(--pink-primary);">'+item.price+'</div></div>';
    });
    var addonPrice = order.addonPrice || (si.addonPrice||0);
    var addonLabel = si.addonChoice || '高級皮質收納盒';
    html += '</div><div style="margin-top:16px;border-top:1px solid var(--border-color);padding-top:12px;">';
    html += '<div class="detail-row"><span>鏡框小計</span><span>NT$'+(order.subtotal - (order.lensPrice||0) - addonPrice).toLocaleString()+'</span></div>';
    if ((order.lensPrice||0) > 0) html += '<div class="detail-row"><span>鏡片費用</span><span>+NT$'+(order.lensPrice).toLocaleString()+'</span></div>';
    if (addonPrice > 0) html += '<div class="detail-row"><span>加購項目（'+addonLabel+'）</span><span>+NT$'+addonPrice.toLocaleString()+'</span></div>';
    if (order.discount > 0) html += '<div class="detail-row"><span>折扣優惠</span><span style="color:#4CAF50;">-NT$'+order.discount.toLocaleString()+'</span></div>';
    html += '<div class="detail-row"><span>運費</span><span>NT$200</span></div>';
    html += '<div class="detail-row" style="color:#4CAF50;"><span>運費折抵</span><span>-NT$200</span></div>';
    html += '<div class="detail-row" style="font-size:18px;font-weight:900;"><span>合計</span><span style="color:var(--pink-primary);">NT$'+order.total.toLocaleString()+'</span></div>';
    html += '</div></div>';
    html += '<div style="text-align:center;"><a href="orders.html" class="btn btn-outline" style="margin-right:12px;">← 返回訂單列表</a><a href="index.html" class="btn btn-primary">繼續購物</a></div>';
    el.innerHTML = html;
});
</script>
</body></html>
