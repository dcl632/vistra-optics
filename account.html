<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員中心 | VISTRA 台灣</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/pages.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.account-grid{display:grid;grid-template-columns:240px 1fr;gap:32px;padding:48px 0;align-items:start;}
.account-sidebar{border-right:1px solid var(--border-color);padding-right:32px;}
.account-sidebar .user-info{text-align:center;margin-bottom:32px;}
.account-sidebar .user-avatar{width:80px;height:80px;border-radius:50%;background:var(--pink-lighter);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:32px;color:var(--pink-primary);}
.account-sidebar .user-name{font-size:18px;font-weight:700;margin-bottom:4px;}
.account-sidebar .user-email{font-size:13px;color:var(--text-light);}
.account-menu a{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;color:var(--text-secondary);transition:var(--transition);margin-bottom:4px;}
.account-menu a:hover,.account-menu a.active{background:var(--pink-lighter);color:var(--pink-primary);}
.account-menu a i{width:18px;text-align:center;}
.account-main h2{font-size:22px;font-weight:700;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border-color);}
.stat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;}
.stat-card{background:var(--bg-light);border-radius:var(--radius-md);padding:24px;text-align:center;}
.stat-card .stat-num{font-size:32px;font-weight:900;color:var(--pink-primary);}
.stat-card .stat-label{font-size:13px;color:var(--text-light);margin-top:4px;}
.recent-orders table{width:100%;border-collapse:collapse;font-size:14px;}
.recent-orders th{text-align:left;padding:12px;background:var(--bg-light);font-weight:700;font-size:13px;color:var(--text-secondary);}
.recent-orders td{padding:12px;border-bottom:1px solid var(--border-color);}
.order-status{display:inline-block;padding:3px 12px;border-radius:var(--radius-xl);font-size:12px;font-weight:700;}
.status-processing{background:#fff3e0;color:#f57c00;}
.status-shipped{background:#e3f2fd;color:#1976d2;}
.status-completed{background:#e8f5e9;color:#388e3c;}
@media(max-width:768px){.account-grid{grid-template-columns:1fr;}.account-sidebar{border-right:none;border-bottom:1px solid var(--border-color);padding-right:0;padding-bottom:24px;}.stat-cards{grid-template-columns:1fr;}.recent-orders{overflow-x:auto;}}
</style>
</head>
<body data-page="">
<div id="shared-header"></div>
<main class="main-content">
<div class="page-banner"><h1>會員中心</h1><p>管理您的帳號與訂單</p></div>
<div class="container">
    <div class="account-grid">
        <aside class="account-sidebar">
            <div class="user-info">
                <div class="user-avatar"><i class="fa-solid fa-user"></i></div>
                <div class="user-name" id="userName">會員</div>
                <div class="user-email" id="userEmail">-</div>
            </div>
            <nav class="account-menu">
                <a href="account.html" class="active"><i class="fa-solid fa-gauge"></i> 總覽</a>
                <a href="orders.html"><i class="fa-solid fa-box"></i> 訂單查詢</a>
                <a href="wishlist.html"><i class="fa-regular fa-heart"></i> 收藏清單</a>
                <a href="account-profile.html"><i class="fa-solid fa-user-pen"></i> 個人資料</a>
                <a href="#" onclick="doLogout();return false;"><i class="fa-solid fa-right-from-bracket"></i> 登出</a>
            </nav>
        </aside>
        <div class="account-main">
            <h2>帳號總覽</h2>
            <div class="stat-cards">
                <div class="stat-card"><div class="stat-num" id="statOrders">0</div><div class="stat-label">訂單數</div></div>
                <div class="stat-card"><div class="stat-num" id="statWishlist">0</div><div class="stat-label">收藏數</div></div>
                <div class="stat-card"><div class="stat-num" id="statPoints">150</div><div class="stat-label">會員點數</div></div>
            </div>
            <div class="recent-orders">
                <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;">近期訂單</h3>
                <div id="recentOrdersTable"></div>
            </div>
        </div>
    </div>
</div>
</main>
<div id="shared-footer"></div>
<script src="js/components.js"></script>
<script src="js/cart.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    if (!currentUser) { location.href = 'login.html'; return; }
    document.getElementById('userName').textContent = currentUser.name || '會員';
    document.getElementById('userEmail').textContent = currentUser.email;
    document.getElementById('statOrders').textContent = orders.length;
    document.getElementById('statWishlist').textContent = wishlist.length;
    var html = '';
    if (orders.length === 0) {
        html = '<p style="color:var(--text-light);font-size:14px;">尚無訂單記錄。<a href="eyeglasses.html" style="color:var(--pink-primary);">前往選購</a></p>';
    } else {
        html = '<table><thead><tr><th>訂單編號</th><th>日期</th><th>金額</th><th>狀態</th><th></th></tr></thead><tbody>';
        orders.slice().reverse().forEach(function(o) {
            var d = new Date(o.createdAt);
            var dateStr = d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
            html += '<tr><td>'+o.id+'</td><td>'+dateStr+'</td><td>NT$'+o.total.toLocaleString()+'</td><td><span class="order-status status-processing">'+o.status+'</span></td><td><a href="order-detail.html?id='+o.id+'" style="color:var(--pink-primary);font-size:13px;">查看</a></td></tr>';
        });
        html += '</tbody></table>';
    }
    document.getElementById('recentOrdersTable').innerHTML = html;
});
</script>
</body></html>
