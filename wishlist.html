<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收藏清單 | VISTRA 台灣</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/pages.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.wishlist-page{padding:48px 0;}
.wishlist-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.wishlist-card{border:1px solid var(--border-color);border-radius:var(--radius-md);padding:20px;text-align:center;position:relative;transition:var(--transition);}
.wishlist-card:hover{box-shadow:var(--shadow-md);}
.wishlist-card .remove-wish{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;border:none;background:var(--bg-light);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-light);transition:var(--transition);}
.wishlist-card .remove-wish:hover{background:#ffebee;color:#e53935;}
.wishlist-card .wish-icon{font-size:48px;color:var(--text-light);margin:16px 0;}
.wishlist-card .wish-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.wishlist-card .wish-price{font-size:17px;font-weight:900;color:var(--pink-primary);margin-bottom:16px;}
@media(max-width:768px){.wishlist-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.wishlist-grid{grid-template-columns:1fr;max-width:320px;margin:0 auto;}}
</style>
</head>
<body data-page="">
<div id="shared-header"></div>
<main class="main-content">
<div class="page-banner"><h1><i class="fa-regular fa-heart"></i> 收藏清單</h1><p>您收藏的商品</p></div>
<div class="container">
    <div class="wishlist-page" id="wishlistContent"></div>
</div>
</main>
<div id="shared-footer"></div>
<script src="js/components.js"></script>
<script src="js/cart.js"></script>
<script>
function renderWishlist() {
    var el = document.getElementById('wishlistContent');
    if (wishlist.length === 0) {
        el.innerHTML = '<div class="empty-state"><i class="fa-regular fa-heart"></i><h2>收藏清單是空的</h2><p>將喜歡的商品加入收藏，方便下次查看</p><a href="eyeglasses.html" class="btn btn-primary">前往選購</a></div>';
        return;
    }
    var html = '<div class="wishlist-grid">';
    wishlist.forEach(function(item) {
        html += '<div class="wishlist-card"><button class="remove-wish" onclick="removeFromWishlist('+item.id+')"><i class="fa-solid fa-xmark"></i></button><div class="wish-icon"><i class="fa-solid fa-glasses"></i></div><div class="wish-name">'+item.name+'</div><div class="wish-price">'+item.price+'</div><button class="btn btn-sm" onclick="addToCart(\''+item.name+'\',\''+item.price+'\')">加入購物車</button></div>';
    });
    html += '</div>';
    el.innerHTML = html;
}
document.addEventListener('DOMContentLoaded', renderWishlist);
</script>
</body></html>
