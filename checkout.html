<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結帳 | VISTRA 台灣</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/pages.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.checkout-layout{display:grid;grid-template-columns:1fr 380px;gap:40px;padding:48px 0;}
.checkout-section{margin-bottom:32px;}
.checkout-section h3{font-size:18px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:8px;}
.checkout-section h3 .step-num{width:28px;height:28px;border-radius:50%;background:var(--pink-primary);color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.payment-options{display:flex;flex-direction:column;gap:12px;}
.payment-option{border:2px solid var(--border-color);border-radius:var(--radius-md);padding:16px 20px;cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:12px;}
.payment-option:hover,.payment-option.selected{border-color:var(--pink-primary);background:var(--pink-lighter);}
.payment-option input[type=radio]{accent-color:var(--pink-primary);}
.payment-option .pay-icon{font-size:24px;color:var(--text-secondary);width:32px;text-align:center;}
.payment-option .pay-name{font-size:14px;font-weight:700;}
.payment-option .pay-desc{font-size:12px;color:var(--text-light);}
.order-summary-side{background:var(--bg-light);border-radius:var(--radius-lg);padding:32px;position:sticky;top:80px;}
.order-summary-side h3{font-size:18px;font-weight:700;margin-bottom:20px;}
.order-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-color);font-size:13px;}
.order-item-img{width:60px;height:48px;background:white;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text-light);font-size:20px;flex-shrink:0;}
.order-item-name{font-weight:700;margin-bottom:2px;}
.order-item-meta{color:var(--text-light);font-size:12px;}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;}
.summary-row.total{font-size:18px;font-weight:900;padding-top:16px;margin-top:8px;border-top:2px solid var(--text-primary);}
.summary-row.total .summary-val{color:var(--pink-primary);}
.summary-row .discount{color:#4CAF50;font-weight:700;}
@media(max-width:768px){.checkout-layout{grid-template-columns:1fr;}.form-row{grid-template-columns:1fr;}.order-summary-side{position:static;}}
</style>
</head>
<body data-page="">
<div id="shared-header"></div>
<main class="main-content">
<div class="page-banner"><h1>結帳</h1><p>請填寫配送及付款資訊</p></div>
<div class="container">
    <div class="checkout-layout">
        <div class="checkout-form-area">
            <form id="checkoutForm" onsubmit="return handleCheckout(event)">
                <div class="checkout-section">
                    <h3><span class="step-num">1</span> 收件資訊</h3>
                    <div class="form-row">
                        <div class="form-group"><label>姓名 *</label><input type="text" id="shipName" class="form-input" required></div>
                        <div class="form-group"><label>手機號碼 *</label><input type="tel" id="shipPhone" class="form-input" required placeholder="09XX-XXX-XXX"></div>
                    </div>
                    <div class="form-group"><label>電子信箱 *</label><input type="email" id="shipEmail" class="form-input" required></div>
                    <div class="form-row">
                        <div class="form-group"><label>縣市</label>
                            <select id="shipCity" class="form-input">
                                <option value="台北市" selected>台北市</option><option>新北市</option><option>桃園市</option><option>台中市</option><option>台南市</option><option>高雄市</option><option>基隆市</option><option>新竹市</option><option>新竹縣</option><option>苗栗縣</option><option>彰化縣</option><option>南投縣</option><option>雲林縣</option><option>嘉義市</option><option>嘉義縣</option><option>屏東縣</option><option>宜蘭縣</option><option>花蓮縣</option><option>台東縣</option><option>澎湖縣</option>
                            </select>
                        </div>
                        <div class="form-group"><label>郵遞區號</label><input type="text" id="shipZip" class="form-input" placeholder="100"></div>
                    </div>
                    <div class="form-group"><label>詳細地址 *</label><input type="text" id="shipAddr" class="form-input" required placeholder="請輸入完整地址"></div>
                    <div class="form-group"><label>備註</label><textarea id="shipNote" class="form-input" rows="3" placeholder="如有特殊需求請在此備註"></textarea></div>
                </div>
                <div class="checkout-section">
                    <h3><span class="step-num">2</span> 配送方式</h3>
                    <div class="payment-options">
                        <label class="payment-option selected">
                            <input type="radio" name="shipping" value="home" checked>
                            <div class="pay-icon"><i class="fa-solid fa-truck"></i></div>
                            <div><div class="pay-name">宅配到府</div><div class="pay-desc">3-5個工作天送達，免運費</div></div>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="shipping" value="store">
                            <div class="pay-icon"><i class="fa-solid fa-store"></i></div>
                            <div><div class="pay-name">門市取貨</div><div class="pay-desc">送達門市後簡訊通知</div></div>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="shipping" value="cvs">
                            <div class="pay-icon"><i class="fa-solid fa-shop"></i></div>
                            <div><div class="pay-name">超商取貨</div><div class="pay-desc">7-ELEVEN / 全家 / 萊爾富</div></div>
                        </label>
                    </div>
                </div>
                <!-- Step 3: Lens Selection -->
                <div class="checkout-section">
                    <h3><span class="step-num">3</span> 鸿片加選 <span style="font-size:12px;font-weight:400;color:var(--text-light);margin-left:8px;">（可不選，僅購買鏡框）</span></h3>
                    <div class="payment-options" style="flex-direction:column;gap:8px;">
                        <label class="payment-option selected" id="lens-none" style="cursor:pointer;">
                            <input type="radio" name="lensChoice" value="0" data-label="僅鏡框（不配鏡片）" checked onchange="onLensChange(this)">
                            <div class="pay-icon"><i class="fa-solid fa-border-none"></i></div>
                            <div><div class="pay-name">僅鏡框（不配鏡片）</div><div class="pay-desc">無須配鏡，可自行配鏡或放裝飾</div></div>
                            <div style="margin-left:auto;font-weight:700;">+NT$0</div>
                        </label>
                        <label class="payment-option" id="lens-100" style="cursor:pointer;">
                            <input type="radio" name="lensChoice" value="1500" data-label="閱讀鏡片 100~200 度" onchange="onLensChange(this)">
                            <div class="pay-icon"><i class="fa-solid fa-glasses"></i></div>
                            <div><div class="pay-name">閱讀鏡片 100~200 度</div><div class="pay-desc">輕度遠視讀書，超薄非球面鏡片</div></div>
                            <div style="margin-left:auto;font-weight:700;">+NT$1,500</div>
                        </label>
                        <label class="payment-option" id="lens-300" style="cursor:pointer;">
                            <input type="radio" name="lensChoice" value="1800" data-label="閱讀鏡片 300~400 度" onchange="onLensChange(this)">
                            <div class="pay-icon"><i class="fa-solid fa-glasses"></i></div>
                            <div><div class="pay-name">閱讀鏡片 300~400 度</div><div class="pay-desc">中度讀書專用，抵護蓝光設計</div></div>
                            <div style="margin-left:auto;font-weight:700;">+NT$1,800</div>
                        </label>
                        <label class="payment-option" id="lens-500" style="cursor:pointer;">
                            <input type="radio" name="lensChoice" value="2200" data-label="閱讀鏡片 500~600 度" onchange="onLensChange(this)">
                            <div class="pay-icon"><i class="fa-solid fa-glasses"></i></div>
                            <div><div class="pay-name">閱讀鏡片 500~600 度</div><div class="pay-desc">高度遠視讀書，專業用鏡片底</div></div>
                            <div style="margin-left:auto;font-weight:700;">+NT$2,200</div>
                        </label>
                        <label class="payment-option" id="lens-650" style="cursor:pointer;">
                            <input type="radio" name="lensChoice" value="2800" data-label="閱讀鏡片 650~700 度" onchange="onLensChange(this)">
                            <div class="pay-icon"><i class="fa-solid fa-glasses"></i></div>
                            <div><div class="pay-name">閱讀鏡片 650~700 度</div><div class="pay-desc">深度讀書最高規格，頂層鏡片底</div></div>
                            <div style="margin-left:auto;font-weight:700;">+NT$2,800</div>
                        </label>
                    </div>
                </div>
                <!-- Step 4: Payment -->
                <div class="checkout-section">
                    <h3><span class="step-num">4</span> 付款方式</h3>
                    <div class="payment-options">
                        <label class="payment-option selected" id="opt-credit">
                            <input type="radio" name="payment" value="credit" checked onchange="onPaymentChange(this)">
                            <div class="pay-icon"><i class="fa-solid fa-credit-card"></i></div>
                            <div><div class="pay-name">信用卡</div><div class="pay-desc">VISA / Mastercard / JCB</div></div>
                        </label>
                        <label class="payment-option" id="opt-paypal">
                            <input type="radio" name="payment" value="paypal" onchange="onPaymentChange(this)">
                            <div class="pay-icon" style="width:50px;background:transparent;padding:0;display:flex;align-items:center;justify-content:flex-start;">
                                <img src="images/paypal-logo.svg?v=2" style="height:22px;width:auto;object-fit:contain;display:block;">
                            </div>
                            <div><div class="pay-name">PayPal325*</div><div class="pay-desc">全球通用，安全付款</div></div>
                        </label>
                        <label class="payment-option" id="opt-atm">
                            <input type="radio" name="payment" value="atm" onchange="onPaymentChange(this)">
                            <div class="pay-icon"><i class="fa-solid fa-building-columns"></i></div>
                            <div><div class="pay-name">ATM 轉帳</div><div class="pay-desc">虛擬帳號匯款</div></div>
                        </label>
                        <label class="payment-option" id="opt-linepay">
                            <input type="radio" name="payment" value="linepay" onchange="onPaymentChange(this)">
                            <div class="pay-icon"><i class="fa-brands fa-line"></i></div>
                            <div><div class="pay-name">LINE Pay</div><div class="pay-desc">使用LINE Pay付款</div></div>
                        </label>
                        <label class="payment-option" id="opt-cod">
                            <input type="radio" name="payment" value="cod" onchange="onPaymentChange(this)">
                            <div class="pay-icon"><i class="fa-solid fa-money-bill-wave"></i></div>
                            <div><div class="pay-name">貨到付款</div><div class="pay-desc">收到商品時付款</div></div>
                        </label>
                    </div>
                </div>
                <div id="creditCardFields" class="checkout-section">
                    <h3><span class="step-num">5</span> 信用卡資訊</h3>
                    <div class="form-group"><label>卡號</label><input type="text" class="form-input" placeholder="1234 5678 9012 3456" maxlength="19"></div>
                    <div class="form-row">
                        <div class="form-group"><label>有效期限</label><input type="text" class="form-input" placeholder="MM/YY"></div>
                        <div class="form-group"><label>安全碼</label><input type="text" class="form-input" placeholder="CVV" maxlength="4"></div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;padding:16px;font-size:16px;margin-top:8px;">
                    <i class="fa-solid fa-lock"></i> 確認下單
                </button>

            </form>
        </div>
        <div class="order-summary-side">
            <div id="orderSummary"></div>
            <div style="background:var(--bg-light); border-radius:var(--radius-lg); padding:24px; margin-top:20px;">
                <h4 style="margin-bottom:12px; font-size:14px; font-weight:700;">優惠代碼</h4>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="promoInput" class="form-input" placeholder="有員工密碼或優惠碼嗎？" style="flex:1; border:1px solid var(--border-color);">
                    <button type="button" class="btn btn-outline" onclick="applyPromo()">套用</button>
                </div>
                <div id="promoMsg" style="font-size:13px; margin-top:8px; color:var(--pink-primary); display:none;"></div>
            </div>
        </div>
    </div>
</div>
</main>
<div id="shared-footer"></div>
<script src="js/components.js?v=2"></script>
<script src="js/cart.js?v=2"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    if (cart.length === 0) { location.href = 'cart.html'; return; }
    // Require login
    if (!currentUser) {
        sessionStorage.setItem('after_login_redirect', 'checkout.html');
        location.href = 'login.html?redirect=checkout';
        return;
    }
    document.getElementById('shipName').value = currentUser.name || '';
    document.getElementById('shipEmail').value = currentUser.email || '';
    document.getElementById('shipPhone').value = currentUser.phone || '';
    renderSummary();
    // Payment option highlight
    document.querySelectorAll('.payment-option').forEach(function(opt) {
        opt.addEventListener('click', function() {
            this.closest('.payment-options').querySelectorAll('.payment-option').forEach(function(o){o.classList.remove('selected');});
            this.classList.add('selected');
        });
    });
});

function onPaymentChange(radio) {
    var ccFields = document.getElementById('creditCardFields');
    var ppBox = document.getElementById('paypalDemoBox');
    if (ccFields) ccFields.style.display = radio.value === 'credit' ? 'block' : 'none';
    if (ppBox) ppBox.style.display = radio.value === 'paypal' ? 'block' : 'none';
}
var employeeDiscountActive = false;
var currentLensPrice = 0;
var currentLensLabel = '僅鏡框（不配鏡片）';

function onLensChange(radio) {
    currentLensPrice = parseInt(radio.value) || 0;
    currentLensLabel = radio.getAttribute('data-label');
    document.querySelectorAll('[id^="lens-"]').forEach(function(el){ el.classList.remove('selected'); });
    radio.closest('.payment-option').classList.add('selected');
    renderSummary();
}

function applyPromo() {
    var code = document.getElementById('promoInput').value.trim();
    var msg = document.getElementById('promoMsg');
    if(code === '999723') {
        employeeDiscountActive = true;
        msg.textContent = '✅ 已套用員工 85 折優惠！';
        msg.style.color = '#4CAF50';
        msg.style.display = 'block';
        renderSummary();
    } else {
        employeeDiscountActive = false;
        msg.textContent = '❌ 無效的優惠代碼';
        msg.style.color = 'var(--pink-primary)';
        msg.style.display = 'block';
        renderSummary();
    }
}

function renderSummary() {
    var el = document.getElementById('orderSummary');
    var frameTotal = getCartTotal();
    var lensPrice = currentLensPrice;
    var subtotal = frameTotal + lensPrice;
    var SHIPPING = 200;
    var disc = getDiscount(subtotal);
    var targetTotal = subtotal - disc + SHIPPING;
    
    var html = '<h3>訂單摘要</h3>';
    cart.forEach(function(item) {
        var imgUrl = '';
        if(item.name.indexOf('LUCENT')>-1 || item.name.indexOf('AURA ICE')>-1) imgUrl = 'images/owndays/aura-ice.png';
        else if(item.name.indexOf('NC3019N')>-1 || item.name.indexOf('OR2071N')>-1) imgUrl = 'images/owndays/eyeglasses_01.webp';
        else if(item.name.indexOf('OF2072T')>-1) imgUrl = 'images/owndays/eyeglasses_02.webp';
        else if(item.name.indexOf('LB1009G')>-1) imgUrl = 'images/owndays/eyeglasses_03.webp';
        else if(item.name.indexOf('OG2025B')>-1) imgUrl = 'images/owndays/eyeglasses_04.webp';
        else if(item.name.indexOf('SNP1020X')>-1) imgUrl = 'images/owndays/eyeglasses_05.webp';
        else if(item.name.indexOf('AF2088T')>-1) imgUrl = 'images/owndays/eyeglasses_06.webp';
        else if(item.name.indexOf('MG3031N')>-1) imgUrl = 'images/owndays/eyeglasses_07.webp';
        else if(item.name.indexOf('PL3050N')>-1) imgUrl = 'images/owndays/eyeglasses_08.webp';
        var imgHtml = imgUrl ? '<img src="'+imgUrl+'" style="width:100%;height:100%;object-fit:cover;background:transparent;">' : '<i class="fa-solid fa-glasses"></i>';
        html += '<div class="order-item"><div class="order-item-img" style="overflow:hidden;">'+imgHtml+'</div><div><div class="order-item-name">'+item.name+'</div><div class="order-item-meta">'+item.lens+' × '+item.qty+'</div></div><div style="margin-left:auto;font-weight:700;">'+item.price+'</div></div>';
    });
    html += '<div style="margin-top:16px;">';
    html += '<div class="summary-row"><span>鏡框小計</span><span>NT$'+frameTotal.toLocaleString()+'</span></div>';
    if (lensPrice > 0) {
        html += '<div class="summary-row"><span>鏡片費用（'+currentLensLabel+'）</span><span>+NT$'+lensPrice.toLocaleString()+'</span></div>';
    }
    if (disc > 0) html += '<div class="summary-row"><span>滿額折扣</span><span class="discount">-NT$'+disc.toLocaleString()+'</span></div>';
    html += '<div class="summary-row"><span>運費</span><span>NT$'+SHIPPING+'</span></div>';
    html += '<div class="summary-row" style="color:#4CAF50;"><span>運費折抵</span><span>-NT$'+SHIPPING+'</span></div>';
    if (employeeDiscountActive) {
        var empSave = Math.round(targetTotal * 0.15);
        targetTotal -= empSave;
        html += '<div class="summary-row" style="color:#4CAF50;"><span>員工優惠 (85折)</span><span>-NT$'+empSave.toLocaleString()+'</span></div>';
    }
    html += '<div class="summary-row total"><span>合計</span><span class="summary-val">NT$'+targetTotal.toLocaleString()+'</span></div>';
    html += '</div>';
    el.innerHTML = html;
}
function handleCheckout(e) {
    e.preventDefault();
    var shipping = {
        name: document.getElementById('shipName').value,
        phone: document.getElementById('shipPhone').value,
        email: document.getElementById('shipEmail').value,
        city: document.getElementById('shipCity').value,
        zip: document.getElementById('shipZip').value,
        address: document.getElementById('shipAddr').value,
        note: document.getElementById('shipNote').value,
        method: document.querySelector('input[name=shipping]:checked').value,
        payment: document.querySelector('input[name=payment]:checked').value,
        lensChoice: currentLensLabel,
        lensPrice: currentLensPrice
    };
    var order = placeOrder(shipping, typeof employeeDiscountActive !== 'undefined' ? employeeDiscountActive : false);
    if (order) {
        localStorage.setItem('vistra_last_order', JSON.stringify(order));
        location.href = 'order-confirmation.html';
    }
    return false;
}
</script>
</body></html>
