<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員登入 | VISTRA 台灣</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/pages.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="">
<div id="shared-header"></div>
<main class="main-content">
<div class="page-banner"><h1>會員登入</h1><p>登入以享受會員專屬優惠</p></div>
<div class="container">
    <div class="auth-page">
        <div class="auth-box" id="loginBox">
            <h2><i class="fa-regular fa-user"></i> 登入</h2>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">電子信箱 *</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">密碼 *</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="請輸入密碼" required>
                </div>
                <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;">
                    <label style="font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;">
                        <input type="checkbox" style="accent-color:var(--pink-primary);"> 記住我
                    </label>
                    <a href="#" style="font-size:13px;color:var(--pink-primary);">忘記密碼？</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;">登入</button>
            </form>
            <div style="text-align:center;margin:24px 0 16px;color:#ccc;font-size:13px;">— 或 —</div>
            <button class="btn btn-outline" style="width:100%;margin-bottom:10px;" onclick="showToast('此功能尚未開放')"><i class="fa-brands fa-google"></i> 使用 Google 登入</button>
            <button class="btn btn-outline" style="width:100%;" onclick="showToast('此功能尚未開放')"><i class="fa-brands fa-facebook-f"></i> 使用 Facebook 登入</button>
            <div class="auth-links">
                還沒有帳號？ <a href="register.html">立即註冊</a>
            </div>
        </div>
    </div>
</div>
</main>
<div id="shared-footer"></div>
<script src="js/components.js"></script>
<script src="js/cart.js"></script>
<script>
function handleLogin(e) {
    e.preventDefault();
    var email = document.getElementById('loginEmail').value;
    var pw = document.getElementById('loginPassword').value;
    if (doLogin(email, pw)) {
        setTimeout(function() { location.href = 'account.html'; }, 800);
    }
    return false;
}
// If already logged in, redirect
document.addEventListener('DOMContentLoaded', function() {
    if (currentUser) { location.href = 'account.html'; }
});
</script>
</body></html>
